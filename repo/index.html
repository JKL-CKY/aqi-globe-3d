<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>全球空气质量 3D 地球</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0a1a;
        font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
        color: #ffffff;
      }

      #app {
        width: 100%;
        height: 100%;
        position: relative;
      }

      canvas {
        display: block;
      }

      #info-panel {
        position: absolute;
        top: 24px;
        left: 24px;
        min-width: 260px;
        padding: 20px 24px;
        background: rgba(15, 20, 40, 0.65);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 12px;
        z-index: 10;
        opacity: 0;
        transform: translateY(-8px);
        transition: opacity 300ms ease, transform 300ms ease;
        pointer-events: none;
      }

      #info-panel.visible {
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
      }

      #info-panel .panel-title {
        font-size: 18px;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.95);
        margin-bottom: 14px;
        letter-spacing: 0.02em;
      }

      #info-panel .panel-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 6px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }

      #info-panel .panel-row:last-child {
        border-bottom: none;
      }

      #info-panel .panel-label {
        font-size: 13px;
        font-weight: 400;
        color: rgba(255, 255, 255, 0.5);
      }

      #info-panel .panel-value {
        font-size: 14px;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.9);
      }

      #info-panel .aqi-badge {
        display: inline-block;
        padding: 2px 10px;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 600;
      }

      #loading-overlay {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: #0a0a1a;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 100;
        transition: opacity 600ms ease;
      }

      #loading-overlay.hidden {
        opacity: 0;
        pointer-events: none;
      }

      #loading-overlay .loading-text {
        font-size: 16px;
        font-weight: 300;
        color: rgba(255, 255, 255, 0.6);
        letter-spacing: 0.1em;
        margin-top: 20px;
      }

      #loading-overlay .loading-spinner {
        width: 40px;
        height: 40px;
        border: 2px solid rgba(255, 255, 255, 0.1);
        border-top: 2px solid rgba(100, 180, 255, 0.8);
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      #legend {
        position: absolute;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 10px 20px;
        background: rgba(15, 20, 40, 0.55);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 10px;
        z-index: 10;
      }

      #legend .legend-item {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      #legend .legend-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
      }

      #legend .legend-label {
        font-size: 11px;
        font-weight: 400;
        color: rgba(255, 255, 255, 0.55);
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="loading-overlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">正在加载全球空气质量数据...</div>
      </div>
      <div id="info-panel">
        <div class="panel-title" id="panel-country">--</div>
        <div class="panel-row">
          <span class="panel-label">AQI 指数</span>
          <span class="panel-value" id="panel-aqi">--</span>
        </div>
        <div class="panel-row">
          <span class="panel-label">PM2.5</span>
          <span class="panel-value" id="panel-pm25">--</span>
        </div>
        <div class="panel-row">
          <span class="panel-label">风向</span>
          <span class="panel-value" id="panel-wind-dir">--</span>
        </div>
        <div class="panel-row">
          <span class="panel-label">风速</span>
          <span class="panel-value" id="panel-wind-speed">--</span>
        </div>
      </div>
      <div id="legend">
        <div class="legend-item">
          <div class="legend-dot" style="background:#00ff88;"></div>
          <span class="legend-label">优 0-50</span>
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:#ffdd00;"></div>
          <span class="legend-label">良 51-100</span>
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:#ff8800;"></div>
          <span class="legend-label">轻度 101-150</span>
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:#ff2200;"></div>
          <span class="legend-label">中度 151-200</span>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
